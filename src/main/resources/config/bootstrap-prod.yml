# ===================================================================
# Spring Cloud Consul Config bootstrap configuration for the "prod" profile
# ===================================================================
logging:
  level:
    org.springframework.cloud.consul: DEBUG
    org.springframework.cloud.bootstrap.config: DEBUG
    org.springframework.boot.context.config: DEBUG

spring:
  cloud:
    consul:
      config:
        fail-fast: true
        format: files # set this to "files" if using git2consul
        profile-separator: '-'
        name: stn-backend
      retry:
        initial-interval: 1000
        max-interval: 2000
        max-attempts: 100
      host: consul
      port: 8500
